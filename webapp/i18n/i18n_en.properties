riskGREEN=Stable
riskYELLOW=Monitor
riskRED=Critical

riskHintGREEN=Green: prompt payment (<=3 days typical), no formal warnings recorded.
riskHintYELLOW=Yellow: elevated delay or at least one warning — monitor containment actions.
riskHintRED=Red: breach thresholds — immediate procurement and treasury alignment required.

legendTitle=Risk legend
legendGreen=Green — among the three most recent orders: delay ≤ 3 days average and no warnings (stable behavior).
legendYellow=Yellow — among the three most recent orders: delay 4–10 days average, ≥ 1 warning, or elevated single-order delay (monitor).
legendRed=Red — among the three most recent orders: average delay > 10 days or ≥ 2 orders paid more than 10 days after due date.

legendRiskPaymentTitle=Payment risk rules
legendGreenPay=GREEN: based on the last 3 orders, average delay is up to 3 days and no payments are more than 3 days late.
legendYellowPay=YELLOW: based on the last 3 orders, average delay is between 4 and 10 days or at least one payment is more than 3 days late.
legendRedPay=RED: based on the last 3 orders, average delay is above 10 days or at least two payments are more than 10 days late.

